<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Document</title>
</head>
<body class="flex flex-col h-screen bg-black">
  <div class="flex-1 w-full flex items-center justify-evenly text-3xl font-bold bg-blue-400">
    <h1>Consulta de Endereço por CEP</h1>
  </div>
  <div class="flex-1 w-full flex items-center justify-evenly ">
    <div>
      <input class="border border-blue-400 p-2 rounded-lg mr-1 text-blue-400 focus:border focus:border-blue-400 focus:outline-none" id="myInput" placeholder="Insira seu CEP aqui" />
      <button class="bg-blue-400 p-2 rounded-lg font-bold  active:bg-black active:text-blue-400 active:border active:border-blue-400 cursor-pointer" id="myButton">Enviar</button>
    </div>
  </div>
  <div class="flex-8 w-full flex justify-evenly" id="myDiv">
    <div class="bg-blue-400 p-4 rounded-lg h-fit w-2/3">
        <p><strong>Endereço:</strong> <span id="endereco"></span></p>
        <p><strong>Bairro:</strong> <span id="bairro"></span></p>
        <p><strong>Cidade:</strong> <span id="cidade"></span></p>
        <p><strong>Estado:</strong> <span id="estado"></span></p>
     </div>
  </div>
</body>
</html>
